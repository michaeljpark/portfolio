            const specific = themeData[node.id];
            if (specific) {
                return specific.map((name, i) => ({
                    id: `${node.id}-p${i}`,
                    name: name,
                    tier: node.tier,
                    isPartner: true,
                    parentNode: node,
                    theme: node.theme
                }));
            }
            
            // Fallback: generic from first available in theme
            const fallbackKey = Object.keys(themeData)[0];
            const fallback = themeData[fallbackKey] || ['Partner 1', 'Partner 2', 'Partner 3', 'Partner 4', 'Partner 5'];

        function exportHighResPNG() {
            const svgEl = document.getElementById('graph');
            const svgClone = svgEl.cloneNode(true);
            
            const vb = svgEl.viewBox.baseVal;
            const w = vb.width || 1400;
            const h = vb.height || 1400;
            
            // Scale factor for high-res (4x)
            const scale = 4;
            
            // Reset any zoom transform on the cloned <g> so content fits viewBox
            const gEl = svgClone.querySelector('g');
            if (gEl) gEl.removeAttribute('transform');
            
            svgClone.setAttribute('width', w * scale);
            svgClone.setAttribute('height', h * scale);
            svgClone.setAttribute('viewBox', `0 0 ${w} ${h}`);
            svgClone.style.width = (w * scale) + 'px';
            svgClone.style.height = (h * scale) + 'px';
            svgClone.style.overflow = 'visible';
            
            // Inline all computed styles for font rendering
            const allElements = svgClone.querySelectorAll('*');
            const origElements = svgEl.querySelectorAll('*');
            allElements.forEach((el, i) => {
                if (origElements[i]) {
                    const computed = window.getComputedStyle(origElements[i]);
                    el.style.fontFamily = computed.fontFamily;
                    el.style.fontSize = computed.fontSize;
                    el.style.fontWeight = computed.fontWeight;
                    el.style.letterSpacing = computed.letterSpacing;
                    el.style.fill = computed.fill;
                    el.style.stroke = computed.stroke;
                    el.style.strokeWidth = computed.strokeWidth;
                    el.style.opacity = computed.opacity;
                }
            });
            
            const serializer = new XMLSerializer();
            let svgString = serializer.serializeToString(svgClone);
            
            if (!svgString.match(/^<svg[^>]+xmlns="http:\/\/www\.w3\.org\/2000\/svg"/)) {
                svgString = svgString.replace(/^<svg/, '<svg xmlns="http://www.w3.org/2000/svg"');
            }
            
            const canvas = document.createElement('canvas');
            canvas.width = w * scale;
            canvas.height = h * scale;
            const ctx = canvas.getContext('2d');
            
            // Black background
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const img = new Image();
            const blob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            
            img.onload = function () {
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                URL.revokeObjectURL(url);
                
                // Download as PNG
                const a = document.createElement('a');
                const tierLabel = allSubsMode ? 'all-subs' : (verticalMode ? 'vertical-all' : (currentCrossTier ? `cross${currentCrossTier}` : (currentTier === 'all' ? 'all' : `tier${currentTier}`)));
                a.download = `stakeholder-map-${tierLabel}-${Date.now()}.png`;
                a.href = canvas.toDataURL('image/png');
                a.click();
            };
            
            img.src = url;
        }

        function renderGraph() {
            // US Letter ratio: 8.5 x 11 inches → vertical mode uses letter proportions
            const width = verticalMode ? 1100 : 1400;
            const height = verticalMode ? 1300 : 1400;
            const centerX = width / 2;
            const centerY = height / 2;

            const svg = d3.select('#graph');
            // Preserve current zoom transform across re-renders so tier→tier
            // transitions chain smoothly instead of snapping back to identity.
            let prevTransform = d3.zoomIdentity;
            const svgNode = svg.node();
            if (svgNode) {
                try { prevTransform = d3.zoomTransform(svgNode); } catch (e) {}
            }
            svg.selectAll('*').remove();

            svg.attr('viewBox', [0, 0, width, height]);

            const g = svg.append('g');

            const zoom = d3.zoom()
                .scaleExtent([0.5, 3])
                // Disable user-driven wheel/touch/dblclick zoom so parent page
                // can scroll freely. Programmatic transitions (auto-zoom on
                // tier change) still work because they bypass this filter.
                .filter(() => false)
                .on('zoom', (event) => {
                    g.attr('transform', event.transform);
                });

            svg.call(zoom);
            svg.on('wheel.zoom', null)
               .on('mousedown.zoom', null)
               .on('dblclick.zoom', null)
               .on('touchstart.zoom', null)
               .on('touchmove.zoom', null)
               .on('touchend.zoom', null);

            // Seed the new zoom behavior with the previous transform so the
            // upcoming transition starts where the last one left off.
            svg.call(zoom.transform, prevTransform);

            const themeOrder = ['media', 'technology', 'ai', 'security', 'robotics', 'legal'];

            // ============================================================
            // STEP 1: Build a stable position map for ALL main nodes ONCE.
            // ============================================================
            const posMap = {};
            
            // Group nodes by tier, sort once
            const tierGroups = {};
            data.nodes.forEach(n => {
                if (!tierGroups[n.tier]) tierGroups[n.tier] = [];
                tierGroups[n.tier].push(n);
            });

            Object.keys(tierGroups).forEach(tier => {
                tierGroups[tier].sort((a, b) => {
                    const ai = themeOrder.indexOf(a.theme);
                    const bi = themeOrder.indexOf(b.theme);
                    if (ai !== bi) return ai - bi;
                    return a.id.localeCompare(b.id);
                });
            });

            // Tier radii (used for radial mode)
            const tierRadius = { 1: 100, 2: 200, 3: 330, 4: 400, 5: 550 };

            if (verticalMode) {
                // VERTICAL STACKED RINGS — small ring at top, larger rings below
                const ringRadii = { 1: 60, 2: 90, 3: 120, 4: 150, 5: 170 };
                const marginTop = 60;
                const gap = 8;
                const ringCenters = {};
                let cumY = marginTop + ringRadii[1];
                for (let t = 1; t <= 5; t++) {
                    const r = ringRadii[t];
                    if (t > 1) cumY += ringRadii[t - 1] + gap + r;
                    ringCenters[t] = { x: width / 2, y: cumY };
                }

                // Hide center node
                posMap[data.center.id] = { x: -999, y: -999, angle: 0 };
                data.center.x = -999;
                data.center.y = -999;

                [1, 2, 3, 4, 5].forEach(tier => {
                    const nodes = tierGroups[tier] || [];
                    const count = nodes.length;
                    const cx = ringCenters[tier].x;
                    const cy = ringCenters[tier].y;
                    const r = ringRadii[tier];

                    nodes.forEach((node, i) => {
                        const angle = (i / count) * 2 * Math.PI - Math.PI / 2;
                        const x = cx + r * Math.cos(angle);
                        const y = cy + r * Math.sin(angle);
                        posMap[node.id] = { x, y, angle };
                        node.x = x;
                        node.y = y;
                        node._ringCx = cx;
                        node._ringCy = cy;
                    });
                });
            } else {
                // RADIAL LAYOUT (original)
                posMap[data.center.id] = { x: centerX, y: centerY, angle: 0 };
                data.center.x = centerX;
                data.center.y = centerY;

                Object.keys(tierGroups).forEach(tier => {
                    const nodes = tierGroups[tier];
                    const r = tierRadius[tier] || (100 * tier);
                    const count = nodes.length;

                    nodes.forEach((node, i) => {
                        const angle = (i / count) * 2 * Math.PI - Math.PI / 2;
                        const x = centerX + r * Math.cos(angle);
                        const y = centerY + r * Math.sin(angle);
                        posMap[node.id] = { x, y, angle };
                        node.x = x;
                        node.y = y;
                    });
                });
            }

            // ============================================================
            // STEP 2: Generate partners for active tier OR cross-tier
            // ============================================================
            let activePartners = [];
            const partnerPosMap = {};
            const tierSubRadius = {};
            
            function generatePartnersForTier(tierNum) {
                const tierNodes = tierGroups[tierNum] || [];
                const tierR = tierRadius[tierNum] || (100 * tierNum);
                let maxSubR = tierR;
                
                tierNodes.forEach(parentNode => {
                    const partners = getPartners(parentNode);
                    const parentPos = posMap[parentNode.id];
                    const partnerCount = partners.length;

                    if (verticalMode) {
                        // Radial fan around ring center, outside the ring
                        const ringRadii = { 1: 60, 2: 90, 3: 120, 4: 150, 5: 170 };
                        const ringR = ringRadii[tierNum] || 100;
                        const parentAngle = parentPos.angle;
                        const offsetR = partnerCount <= 5 ? 18 : (partnerCount <= 10 ? 22 : (partnerCount <= 12 ? 25 : 30));
                        const subRadius = ringR + offsetR;
                        const cx = parentNode._ringCx;
                        const cy = parentNode._ringCy;
                        
                        const nodeCount = tierNodes.length;
                        const nodeGap = (2 * Math.PI) / nodeCount;
                        const spreadAngle = nodeGap * 0.7;
                        
                        partners.forEach((p, pi) => {
                            const t = partnerCount === 1 ? 0 : (pi / (partnerCount - 1)) - 0.5;
                            const angle = parentAngle + t * spreadAngle;
                            p.x = cx + subRadius * Math.cos(angle);
                            p.y = cy + subRadius * Math.sin(angle);
                            p._ringCx = cx;
                            p._ringCy = cy;
                            partnerPosMap[`${parentNode.id}-${p.name}`] = { x: p.x, y: p.y };
                        });
                    } else {
                        // Radial fan
                        const parentAngle = parentPos.angle;
                        let offsetR;
                        if (allSubsMode) {
                            // Tighter offsets to fit all tiers
                            offsetR = partnerCount <= 5 ? 20 : (partnerCount <= 10 ? 28 : (partnerCount <= 12 ? 32 : 38));
                        } else {
                            offsetR = partnerCount <= 5 ? 30 : (partnerCount <= 10 ? 40 : (partnerCount <= 12 ? 45 : 55));
                        }
                        const subRadius = tierR + offsetR;
                        if (subRadius > maxSubR) maxSubR = subRadius;
                        
                        const nodeCount = tierNodes.length;
                        const nodeGap = (2 * Math.PI) / nodeCount;
                        const spreadAngle = nodeGap * 0.7;
                        
                        partners.forEach((p, pi) => {
                            const t = partnerCount === 1 ? 0 : (pi / (partnerCount - 1)) - 0.5;
                            const angle = parentAngle + t * spreadAngle;
                            p.x = centerX + subRadius * Math.cos(angle);
                            p.y = centerY + subRadius * Math.sin(angle);
                            partnerPosMap[`${parentNode.id}-${p.name}`] = { x: p.x, y: p.y };
                        });
                    }

                    activePartners = activePartners.concat(partners);
                });
                tierSubRadius[tierNum] = maxSubR;
            }

            if (verticalMode || allSubsMode) {
                [1, 2, 3, 4, 5].forEach(t => generatePartnersForTier(t));
            } else if (currentCrossTier) {
                const [tierA, tierB] = currentCrossTier.split('-').map(Number);
                generatePartnersForTier(tierA);
                generatePartnersForTier(tierB);
            } else if (currentTier !== 'all') {
                generatePartnersForTier(currentTier);
            }

            // ============================================================
            // STEP 3: Build display list
            // ============================================================
            const allNodes = verticalMode 
                ? [...data.nodes]
                : [data.center, ...data.nodes];
            const displayNodes = [...allNodes, ...activePartners];
            // Progressive reveal: when a numeric tier is focused, hide every
            // node from tiers AFTER it. Tiers <= currentTier remain visible.
            const maxVisibleTier = (typeof currentTier === 'number') ? currentTier : 5;
            const tierVisible = (n) => {
                if (n.tier === 0 || n.tier == null) return true; // center
                return n.tier <= maxVisibleTier;
            };
            const filteredNodes = (currentTheme === 'all'
                ? displayNodes
                : displayNodes.filter(n => n.tier === 0 || n.theme === currentTheme || (n.isPartner && n.theme === currentTheme))
            ).filter(tierVisible);

            // ============================================================
            // STEP 4: Auto-zoom
            // ============================================================
            const ZOOM_DURATION = 1100;
            const ZOOM_EASE = d3.easeCubicInOut;
            // Mark SVG as zooming so CSS can disable text hit-testing /
            // shaping and the browser can composite faster.
            svg.classed('is-zooming', true);
            function runZoom(t){
                return svg.transition()
                   .duration(ZOOM_DURATION)
                   .ease(ZOOM_EASE)
                   .call(zoom.transform, t)
                   .on('end.zoomflag interrupt.zoomflag', function(){
                       svg.classed('is-zooming', false);
                   });
            }
            if (verticalMode || allSubsMode) {
                runZoom(d3.zoomIdentity);
            } else if (currentCrossTier) {
                const [tierA, tierB] = currentCrossTier.split('-').map(Number);
                const rB = tierSubRadius[tierB] || tierRadius[tierB] || (100 * tierB);
                const divisor = tierB <= 2 ? 2.3 : (tierB <= 3 ? 2.35 : (tierB <= 4 ? 2.3 : 2.35));
                const scale = Math.min(width / (rB * divisor), height / (rB * divisor));
                const finalScale = Math.min(scale, 2.2);
                const transform = d3.zoomIdentity
                    .translate(width / 2, height / 2)
                    .scale(finalScale)
                    .translate(-width / 2, -height / 2);
                runZoom(transform);
            } else if (currentTier !== 'all' && currentTier !== 0) {
                const r = tierSubRadius[currentTier] || tierRadius[currentTier] || (100 * currentTier);
                const divisor = currentTier <= 2 ? 2.3 : (currentTier <= 3 ? 2.3 : (currentTier <= 4 ? 2.25 : 2.25));
                const scale = Math.min(width / (r * divisor), height / (r * divisor));
                const finalScale = Math.min(scale, 2.2);
                const transform = d3.zoomIdentity
                    .translate(width / 2, height / 2)
                    .scale(finalScale)
                    .translate(-width / 2, -height / 2);
                runZoom(transform);
            } else {
                runZoom(d3.zoomIdentity);
            }

            // ============================================================
            // STEP 5: Create links
            // ============================================================
            const links = [];
            filteredNodes.forEach(node => {
                if (node.isPartner) {
                    links.push({ source: node.parentNode, target: node, isPartnerLink: true });
                } else if (verticalMode && node.tier > 1) {
                    // Connect to same-theme node in tier above
                    const prevTier = tierGroups[node.tier - 1];
                    if (prevTier) {
                        const relatedNode = prevTier.find(n => n.theme === node.theme);
                        if (relatedNode) {
                            links.push({ source: relatedNode, target: node, strength: 0.4 });
                        }
                    }
                } else if (node.tier === 1 && !verticalMode) {
                    links.push({ source: data.center, target: node, strength: 1 });
                } else if (node.tier > 1 && !verticalMode) {
                    const prevTier = tierGroups[node.tier - 1];
                    if (prevTier) {
                        const relatedNode = prevTier.find(n => n.theme === node.theme) || prevTier[0];
                        if (relatedNode) {
                            links.push({ source: relatedNode, target: node, strength: 0.6 });
                        }
                    }
                }
            });

            // Build cross-tier curved links
            let crossLinks = [];
            if (currentCrossTier) {
                const relations = crossTierRelations[currentCrossTier] || [];
                relations.forEach(rel => {
                    const fromKey = `${rel.from}-${rel.fromSub}`;
                    const toKey = `${rel.to}-${rel.toSub}`;
                    const fromPos = partnerPosMap[fromKey];
                    const toPos = partnerPosMap[toKey];
                    if (fromPos && toPos) {
                        crossLinks.push({
                            sx: fromPos.x, sy: fromPos.y,
                            tx: toPos.x, ty: toPos.y,
                            fromLabel: rel.fromSub,
                            toLabel: rel.toSub
                        });
                    }
                });
            }

            // Determine active tiers for opacity
            let activeTiers = [];
            if (currentCrossTier) {
                activeTiers = currentCrossTier.split('-').map(Number);
            } else if (currentTier !== 'all') {
                activeTiers = [currentTier];
            }

            // ============================================================
            // STEP 6: Draw
            // ============================================================
            
            // Draw links
            if (!hideLines) {
            g.append('g')
                .selectAll('line')
                .data(links)
                .join('line')
                .attr('x1', d => d.source.x)
                .attr('y1', d => d.source.y)
                .attr('x2', d => d.target.x)
                .attr('y2', d => d.target.y)
                .attr('stroke', '#ffffff')
                .attr('stroke-width', d => d.isPartnerLink ? 0.3 : 0.5)
                .attr('stroke-opacity', d => {
                     if (d.isPartnerLink) return 0.6;
                     if (activeTiers.length === 0) return 0.2;
                     const active = activeTiers.includes(d.target.tier) || activeTiers.includes(d.source.tier);
                     return active ? 0.4 : 0.05;
                });
            }

            // Draw cross-tier links using Hierarchical Edge Bundling
            // Curves stay WITHIN the annular band — never crossing tier circle boundaries
            if (!hideLines && crossLinks.length > 0) {
                const beta = 0.85;
                const bundleLine = d3.line().curve(d3.curveBundle.beta(beta));
                
                const [tA, tB] = currentCrossTier.split('-').map(Number);
                const rA = tierSubRadius[tA] || tierRadius[tA] || (100 * tA);
                const rB = tierSubRadius[tB] || tierRadius[tB] || (100 * tB);
                // Band boundaries: inner edge of inner tier subs, outer edge of outer tier subs
                const rMin = Math.min(rA, rB);
                const rMax = Math.max(rA, rB);
                
                g.append('g')
                    .selectAll('path')
                    .data(crossLinks)
                    .join('path')
                    .attr('d', (d, i) => {
                        const angleS = Math.atan2(d.sy - centerY, d.sx - centerX);
                        const angleT = Math.atan2(d.ty - centerY, d.tx - centerX);
                        
                        let angleDiff = angleT - angleS;
                        if (angleDiff > Math.PI) angleDiff -= 2 * Math.PI;
                        if (angleDiff < -Math.PI) angleDiff += 2 * Math.PI;
                        
                        // Distribute control points across the band to reduce overlap
                        // Use index to slightly vary the radius of intermediate points
                        const bandWidth = rMax - rMin;
                        const jitter = ((i * 7) % 11) / 11; // pseudo-random 0-1 per link
                        
                        // 5 intermediate angles for smoother curves
                        const a1 = angleS + angleDiff * 0.2;
                        const a2 = angleS + angleDiff * 0.4;
                        const a3 = angleS + angleDiff * 0.5;
                        const a4 = angleS + angleDiff * 0.6;
                        const a5 = angleS + angleDiff * 0.8;
                        
                        // Radii: stay within band, vary per link to spread curves
                        const r1 = rMin + bandWidth * (0.3 + jitter * 0.15);
                        const r2 = rMin + bandWidth * (0.2 + jitter * 0.2);
                        const r3 = rMin + bandWidth * (0.15 + jitter * 0.25);
                        const r4 = rMin + bandWidth * (0.2 + jitter * 0.2);
                        const r5 = rMin + bandWidth * (0.3 + jitter * 0.15);
                        
                        const points = [
                            [d.sx, d.sy],
                            [centerX + r1 * Math.cos(a1), centerY + r1 * Math.sin(a1)],
                            [centerX + r2 * Math.cos(a2), centerY + r2 * Math.sin(a2)],
                            [centerX + r3 * Math.cos(a3), centerY + r3 * Math.sin(a3)],
                            [centerX + r4 * Math.cos(a4), centerY + r4 * Math.sin(a4)],
                            [centerX + r5 * Math.cos(a5), centerY + r5 * Math.sin(a5)],
                            [d.tx, d.ty]
                        ];
                        
                        return bundleLine(points);
                    })
                    .attr('fill', 'none')
                    .attr('stroke', '#ffffff')
                    .attr('stroke-width', 0.5)
                    .attr('stroke-opacity', 1.0);
            }

            // Draw tier guides
            if (verticalMode) {
                const ringRadii = { 1: 60, 2: 90, 3: 120, 4: 150, 5: 170 };
                const tierLabels = { 1: 'Tier 1 — Technology & Data', 2: 'Tier 2 — AI Services', 3: 'Tier 3 — Data Security', 4: 'Tier 4 — Physical Robotics', 5: 'Tier 5 — Legal & Regulatory' };
                // Recalculate ring centers
                const gap = 8;
                const mTop = 60;
                const rc = {};
                let cY = mTop + ringRadii[1];
                for (let t = 1; t <= 5; t++) {
                    if (t > 1) cY += ringRadii[t - 1] + gap + ringRadii[t];
                    rc[t] = cY;
                }
                [1, 2, 3, 4, 5].forEach(tier => {
                    g.append('circle')
                        .attr('cx', width / 2).attr('cy', rc[tier]).attr('r', ringRadii[tier])
                        .attr('fill', 'none').attr('stroke', '#333')
                        .attr('stroke-width', 0.5).attr('opacity', 0.4);
                    // Tier label above ring
                    g.append('text')
                        .attr('x', width / 2).attr('y', rc[tier] - ringRadii[tier] - 8)
                        .attr('text-anchor', 'middle')
                        .style('font-family', 'Helvetica, sans-serif')
                        .style('font-size', '7px').style('fill', '#555')
                        .style('letter-spacing', '-0.3px')
                        .text(tierLabels[tier]);
                });
            } else {
                [1, 2, 3, 4, 5].forEach(tier => {
                    if (tier > maxVisibleTier) return; // hide future-tier rings
                    const r = tierRadius[tier] || (100 * tier);
                    g.append('circle')
                        .attr('cx', centerX).attr('cy', centerY).attr('r', r)
                        .attr('fill', 'none').attr('stroke', '#333')
                        .attr('stroke-width', 0.5)
                        .attr('opacity', activeTiers.length === 0 || activeTiers.includes(tier) ? 0.5 : 0.25);
                });
            }

            // Draw nodes
            const node = g.append('g')
                .selectAll('g')
                .data(filteredNodes)
                .join('g')
                .attr('transform', d => `translate(${d.x},${d.y})`)
                .attr('opacity', d => {
                    if (verticalMode) return d.isPartner ? 0.7 : 1;
                    if (d.isPartner) return 0.8;
                    if (d.tier === 0) return 1;
                    if (activeTiers.length === 0) return 1;
                    if (activeTiers.includes(d.tier)) return 1;
                    return 0.3; 
                });

            node.append('circle')
                .attr('r', d => {
                    if (verticalMode) return d.isPartner ? 1.5 : 3;
                    if (allSubsMode) return d.isPartner ? 1.5 : 3;
                    return d.isPartner ? 2 : 4;
                })
                .attr('fill', '#ffffff');

            node.append('text')
                .attr('text-anchor', d => {
                    if (!d.isPartner) return 'middle';
                    const rcx = verticalMode ? (d._ringCx || d.parentNode._ringCx) : centerX;
                    const rcy = verticalMode ? (d._ringCy || d.parentNode._ringCy) : centerY;
                    const angle = Math.atan2(d.y - rcy, d.x - rcx);
                    const deg = angle * 180 / Math.PI;
                    return (deg > 90 || deg < -90) ? 'end' : 'start';
                })
                .attr('dx', d => {
                    if (!d.isPartner) return 0;
                    const rcx = verticalMode ? (d._ringCx || d.parentNode._ringCx) : centerX;
                    const rcy = verticalMode ? (d._ringCy || d.parentNode._ringCy) : centerY;
                    const angle = Math.atan2(d.y - rcy, d.x - rcx);
                    const deg = angle * 180 / Math.PI;
                    return (deg > 90 || deg < -90) ? (allSubsMode ? -4 : -6) : (allSubsMode ? 4 : 6);
                })
                .attr('dy', d => d.isPartner ? 3 : (verticalMode ? -6 : -12))
                .attr('transform', d => {
                    if (!d.isPartner) return null;
                    const rcx = verticalMode ? (d._ringCx || d.parentNode._ringCx) : centerX;
                    const rcy = verticalMode ? (d._ringCy || d.parentNode._ringCy) : centerY;
                    const angle = Math.atan2(d.y - rcy, d.x - rcx);
                    let deg = angle * 180 / Math.PI;
                    if (deg > 90 || deg < -90) {
                        deg += 180;
                    }
                    return `rotate(${deg})`;
                })
                .style('font-family', 'Helvetica, sans-serif')
                .style('font-size', d => {
                    if (verticalMode) return d.isPartner ? '3.5px' : '5px';
                    if (allSubsMode) return d.isPartner ? '6px' : '9.5px';
                    return d.isPartner ? '6px' : '10px';
                })
                .style('font-weight', '400')
                .style('fill', '#fff')
                .style('letter-spacing', '-0.5px')
                .style('display', d => (d.isPartner && hideLines && !verticalMode) ? 'none' : null)
                .text(d => d.name);

            // Apply word wrap only to non-partner (main) node labels
            node.selectAll('text')
                .filter(d => !d.isPartner)
                .call(wrap, verticalMode ? 50 : (allSubsMode ? 60 : 100));

            function wrap(text, width) {
                text.each(function () {
                    const text = d3.select(this);
                    const words = text.text().split(/\s+/).reverse();
                    let word;
                    let line = [];
                    let lineNumber = 0;
                    const lineHeight = 1.1;
                    const y = text.attr('y');
                    const dy = parseFloat(text.attr('dy'));
                    let tspan = text.text(null).append('tspan').attr('x', 0).attr('y', y).attr('dy', dy + 'px');

                    while (word = words.pop()) {
                        line.push(word);
                        tspan.text(line.join(' '));
                        if (tspan.node().getComputedTextLength() > width) {
                            line.pop();
                            tspan.text(line.join(' '));
                            line = [word];
                            tspan = text.append('tspan').attr('x', 0).attr('y', y).attr('dy', ++lineNumber * lineHeight + dy + 'px').text(word);
                        }
                    }
                });
            }
        }

        // postMessage API for parent (scrollytelling host) to drive tier state.
        // Accepts: { type:'setTier', tier: 0|1|2|3|4|5 }  (0 or 'all' resets)
        // Sends back { type:'tierDone', tier } when the zoom transition settles.
        let _renderInFlight = false;
        let _queuedTier = null;
        function _runRender(){
            _renderInFlight = true;
            // Defer the (expensive) DOM rebuild to the next frame so the
            // browser can finish the current paint/scroll work first.
            requestAnimationFrame(function(){
                renderGraph();
                // The d3 zoom transition is 1100ms; signal slightly after.
                setTimeout(function(){
                    _renderInFlight = false;
                    try { parent.postMessage({ type:'tierDone', tier: currentTier }, '*'); } catch(e){}
                    if (_queuedTier !== null){
                        var next = _queuedTier; _queuedTier = null;
                        if (next !== currentTier){
                            currentTier = next;
                            _runRender();
                        }
                    }
                }, 1180);
            });
        }
        window.addEventListener('message', (e) => {
            var d = e.data || {};
            if (d && d.type === 'setTier'){
                verticalMode = false;
                allSubsMode = false;
                currentCrossTier = null;
                var t = d.tier;
                var nextTier = (t === 0 || t === 'all' || t == null) ? 'all' : parseInt(t);
                if (_renderInFlight){
                    _queuedTier = nextTier;
                    return;
                }
                if (nextTier === currentTier) return;
                currentTier = nextTier;
                _runRender();
            } else if (d && d.type === 'setCross'){
                verticalMode = false;
                allSubsMode = false;
                currentTier = 'all';
                currentCrossTier = d.cross || null;
                if (_renderInFlight){ _queuedTier = null; return; }
                _runRender();
            }
        });

        // Initial render
        renderGraph();
    </script>
</body>
</html>
