<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TokenTrust — Roadmap</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Times New Roman', Times, serif;
  }
  .wrap { width: 100%; max-width: 1050px; padding: 20px; }
  svg { display: block; width: 100%; height: auto; }
</style>
</head>
<body>

<div class="wrap">
  <svg viewBox="0 0 1050 500" xmlns="http://www.w3.org/2000/svg">
    
    <!-- Grid/Phase Lines -->
    <line x1="200" y1="50" x2="200" y2="450" stroke="#000" stroke-width="0.5" stroke-dasharray="10, 10" opacity="0.3"/>
    <line x1="500" y1="50" x2="500" y2="450" stroke="#000" stroke-width="0.5" stroke-dasharray="10, 10" opacity="0.3"/>
    <line x1="800" y1="50" x2="800" y2="450" stroke="#000" stroke-width="0.5" stroke-dasharray="10, 10" opacity="0.3"/>

    <!-- Track: Data Traceability -->
    <path d="M 50 120 L 500 120" fill="none" stroke="#000" stroke-width="1" opacity="0.5"/>
    <text x="50" y="110" font-size="12"  fill="#000">Data Traceability</text>
    <!-- Phase 1 Node -->
    <circle cx="200" cy="120" r="4" fill="#000"/>
    <text x="210" y="135" font-size="12" fill="#000">DQI Infrastructure Setup (Prerequisite)</text>
    <!-- Phase 2 Node -->
    <circle cx="500" cy="120" r="4" fill="#000"/>
    <text x="510" y="135" font-size="12" fill="#000">Pilot Data Traceability Verification</text>

    <!-- Track: Data Refund & Compensation -->
    <path d="M 50 220 L 200 220 C 350 220, 350 220, 500 220 L 800 220" fill="none" stroke="#000" stroke-width="1" opacity="0.5"/>
    <text x="50" y="210" font-size="12"  fill="#000">Data Refund & Compensation</text>
    <!-- Phase 2 Node -->
    <circle cx="500" cy="220" r="4" fill="#000"/>
    <text x="510" y="235" font-size="12" fill="#000">Reward Token Structure Pilot Testing</text>
    <!-- Phase 3 Node -->
    <circle cx="800" cy="220" r="4" fill="#000"/>
    <text x="810" y="235" font-size="12" fill="#000">Full-scale Refund Operation</text>

    <!-- Track: Interplatform Value Management -->
    <path d="M 50 320 L 500 320 C 650 320, 650 320, 800 320" fill="none" stroke="#000" stroke-width="1" opacity="0.5"/>
    <text x="50" y="310" font-size="12"  fill="#000">Interplatform Value Management</text>
    <!-- Phase 3 Node -->
    <circle cx="800" cy="320" r="4" fill="#000"/>
    <text x="810" y="335" font-size="12" fill="#000">Cross-Platform Token Exchange Initiation</text>

    <!-- Track: Holistic Regulatory Alternative -->
    <path d="M 50 420 L 800 420" fill="none" stroke="#000" stroke-width="1" opacity="0.5"/>
    <text x="50" y="410" font-size="12"  fill="#000">Holistic Regulatory Alternative</text>
    <!-- Phase 1 Node -->
    <circle cx="200" cy="420" r="4" fill="#000"/>
    <text x="210" y="435" font-size="12" fill="#000">PIPEDA, FINTRAC &amp; CIPP/C Frameworks</text>
    <!-- Phase 2 Node -->
    <circle cx="500" cy="420" r="4" fill="#000"/>
    <text x="510" y="435" font-size="12" fill="#000">OPC Consultation &amp; PACC Network Entry</text>
    <!-- Phase 3 Node -->
    <circle cx="800" cy="420" r="4" fill="#000"/>
    <text x="810" y="435" font-size="12" fill="#000">CBPR &amp; ISO/IEC 42001 Global Expansion</text>

  </svg>
</div>

</body>
</html>
