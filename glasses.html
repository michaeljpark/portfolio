<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Glasses — Radio Anime</title>
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  html, body{
    width:100%; height:100%;
    background:#d4d4d4;
    overflow:hidden;
    font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  .stage-wrap{
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
  }

  /* Tabloid page — portrait 11 : 17 */
  .tabloid{
    position:relative;
    background:#fff;
    width:  min(100vw, calc(100vh * 11 / 17));
    height: min(100vh, calc(100vw * 17 / 11));
    aspect-ratio: 11 / 17;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    box-shadow: 0 8px 48px rgba(0,0,0,.18);
  }

  /* ── Masthead ── */
  .tb-head{
    flex-shrink:0;
    padding: 4.5% 5% 3%;
    border-bottom: 2.5px solid #0a0a0a;
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:12px;
  }
  .tb-masthead{
    font-size: clamp(28px, 7.5vmin, 80px);
    font-weight:600;
    letter-spacing:-0.06em;
    line-height:0.92;
    text-transform:uppercase;
  }
  .tb-right{
    text-align:right;
    flex-shrink:0;
  }
  .tb-vol{
    font-size: clamp(7px, 1.6vmin, 14px);
    letter-spacing:0.08em;
    color:#888;
    text-transform:uppercase;
    line-height:1.4;
  }

  /* ── Deck rule ── */
  .tb-deck{
    flex-shrink:0;
    padding: 1.8% 5% 0;
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    gap:16px;
  }
  .tb-deck-head{
    font-size: clamp(9px, 2vmin, 18px);
    font-weight:500;
    letter-spacing:-0.03em;
    line-height:1.2;
    color:#0a0a0a;
  }
  .tb-deck-sub{
    font-size: clamp(6px, 1.3vmin, 12px);
    color:#aaa;
    letter-spacing:0.04em;
    white-space:nowrap;
    flex-shrink:0;
  }

  /* ── Video ── */
  .tb-video{
    flex:1;
    position:relative;
    overflow:hidden;
    margin: 1.8% 5% 0;
  }
  .tb-video video{
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover;
    display:block;
  }

  /* ── Footer ── */
  .tb-foot{
    flex-shrink:0;
    margin: 0 5%;
    padding: 2% 0 3.5%;
    border-top: 1px solid #e0e0e0;
    margin-top: 1.8%;
    display:flex;
    align-items:center;
    justify-content:space-between;
    font-size: clamp(5px, 1.1vmin, 10px);
    color:#bbb;
    letter-spacing:0.07em;
    text-transform:uppercase;
  }

  /* ── Toolbar ── */
  .toolbar{
    position:fixed; top:12px; right:12px;
    z-index:9999;
    display:flex; gap:6px;
    user-select:none;
    transition:opacity .25s ease;
  }
  .toolbar.hidden{ opacity:0; pointer-events:none; }
  .toolbar button{
    appearance:none; border:1px solid #e5e5e5;
    background:#fff; color:#666;
    padding:4px 8px; border-radius:4px;
    font:11px "Helvetica Neue",sans-serif;
    letter-spacing:0.03em;
    cursor:pointer;
  }
  .toolbar button:hover{ color:#000; border-color:#999; }
</style>
</head>
<body>

<div class="stage-wrap">
  <div class="tabloid">

    <div class="tb-head">
      <div class="tb-masthead">Glasses</div>
      <div class="tb-right">
        <div class="tb-vol">Radio Anime<br>Vol. I · 2026</div>
      </div>
    </div>

    <div class="tb-deck">
      <div class="tb-deck-head">OnGen Radio — Animated Short</div>
      <div class="tb-deck-sub">Michael Joongmin Park</div>
    </div>

    <div class="tb-video">
      <video src="./radioanime.mp4"
             autoplay muted loop playsinline preload="auto"></video>
    </div>

    <div class="tb-foot">
      <span>OnGen Radio · 2026</span>
      <span>Glasses Stage</span>
    </div>

  </div>
</div>

<div class="toolbar" id="toolbar">
  <button data-action="toggle-ui">Hide UI (H)</button>
</div>

<script>
(function(){
  var toolbar = document.getElementById('toolbar');
  document.addEventListener('keydown', function(e){
    if ((e.key||'').toLowerCase() === 'h') toolbar.classList.toggle('hidden');
  });
  toolbar.addEventListener('click', function(e){
    var btn = e.target.closest('button');
    if (btn && btn.dataset.action === 'toggle-ui') toolbar.classList.toggle('hidden');
  });
})();
</script>

</body>
</html>
