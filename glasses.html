<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Glasses Stage — Radio Anime</title>
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  html, body{
    width:100%; height:100%;
    background:#ffffff;
    overflow:hidden;
    font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  }

  .stage-wrap{
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    background:#ffffff;
  }
  .stage{
    position:relative;
    aspect-ratio: 16 / 9;
    width:100%;
    max-width:calc(100vh * 16 / 9);
    max-height:100vh;
    background:#ffffff;
    overflow:hidden;
    border-radius:20px;
  }
  .stage-video{
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover;
    display:block;
    pointer-events:none;
    user-select:none;
  }

  .toolbar{
    position:fixed; top:12px; right:12px;
    z-index:9999;
    display:flex; gap:6px;
    font-size:11px; color:#888;
    letter-spacing:0.04em;
    user-select:none;
    transition:opacity .25s ease;
  }
  .toolbar.hidden{ opacity:0; pointer-events:none; }
  .toolbar button{
    appearance:none; border:1px solid #e5e5e5;
    background:#fff; color:#666;
    padding:4px 8px; border-radius:4px;
    font:inherit; cursor:pointer;
  }
  .toolbar button:hover{ color:#000; border-color:#999; }
</style>
</head>
<body>

<div class="stage-wrap">
  <div class="stage" id="stage">
    <video class="stage-video"
           data-src="./radioanime.mp4"
           autoplay muted loop playsinline preload="none"></video>
  </div>
</div>

<div class="toolbar" id="toolbar">
  <button data-action="toggle-ui">hide UI (H)</button>
</div>

<script>
(function(){
  var toolbar = document.getElementById('toolbar');
  document.addEventListener('keydown', function(e){
    var k = (e.key || '').toLowerCase();
    if (k === 'h') toolbar.classList.toggle('hidden');
  });
  toolbar.addEventListener('click', function(e){
    var btn = e.target.closest('button');
    if (!btn) return;
    if (btn.getAttribute('data-action') === 'toggle-ui') toolbar.classList.toggle('hidden');
  });
})();
</script>

<script>
(function(){
  var io=new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      var v=e.target;
      if(e.isIntersecting){
        if(v.dataset.src&&!v.getAttribute('src')){ v.src=v.dataset.src; }
        v.play().catch(function(){});
      } else { v.pause(); }
    });
  },{threshold:0.1});
  function obs(v){ io.observe(v); }
  document.querySelectorAll('video[data-src]').forEach(obs);
  new MutationObserver(function(ms){
    ms.forEach(function(m){
      m.addedNodes.forEach(function(n){
        if(n.nodeType!==1) return;
        if(n.tagName==='VIDEO'&&n.dataset.src) obs(n);
        else if(n.querySelectorAll) n.querySelectorAll('video[data-src]').forEach(obs);
      });
    });
  }).observe(document.body,{childList:true,subtree:true});
})();
</script>
</body>
</html>
