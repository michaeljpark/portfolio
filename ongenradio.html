<style>
  :root{
    --bg:#0a0a0a; --ink:#ffffff; --muted:#8a8a8a; --line:#2a2a2a;
    --max:1320px; --pad:clamp(20px,4vw,56px);
    --font:"Helvetica Neue",Helvetica,Arial,sans-serif;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ background:var(--bg); color:var(--ink); }
  body{
    font-family:var(--font); font-size:14px; line-height:1.5; font-weight:400;
    letter-spacing:-0.05em; -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility; overflow-x:hidden;
  }
  a{ color:inherit; text-decoration:none; }
  img{ display:block; max-width:100%; }
  ::selection{ background:var(--ink); color:var(--bg); }
  .wrap{ max-width:var(--max); margin:0 auto; padding-left:var(--pad); padding-right:var(--pad); }

  nav.top{
    position:sticky; top:0; z-index:50;
    background:color-mix(in srgb, var(--bg) 88%, transparent);
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  }
  .nav-inner{
    display:flex; align-items:center; justify-content:space-between;
    padding:18px var(--pad); max-width:var(--max); margin:0 auto; font-size:13px;
  }
  .nav-mark{ font-weight:500; }
  .nav-links{ display:flex; gap:28px; }
  .nav-links a{ color:var(--muted); transition:color .2s; }
  .nav-links a:hover{ color:var(--ink); }

  header.hero{
    padding:64px var(--pad) 64px;
    border-bottom:1px solid var(--line);
  }
  .hero-back{ font-size:13px; color:var(--muted); margin-bottom:32px; }
  .hero-back a:hover{ color:var(--ink); }
  .hero-greeting{ font-size:17px; color:var(--muted); margin-bottom:6px; }
  .hero-name{
    font-weight:500; font-size:clamp(28px,4.5vw,64px);
    line-height:1.05; letter-spacing:-0.05em;
  }
  .hero-tagline{ font-size:16px; color:var(--muted); margin-top:14px; line-height:1.5; }
  .hero-row{ margin-top:36px; padding-top:24px; border-top:1px solid var(--line); }
  .hero-side{
    display:flex; flex-direction:row; justify-content:space-between;
    flex-wrap:wrap; font-size:13px; gap:16px;
  }
  .hero-side .pair{ display:flex; flex-direction:column; gap:2px; }
  .hero-side dt{ color:var(--muted); }
  .view-link{ border-bottom:1px solid var(--ink); transition:opacity .2s; }
  .view-link:hover{ opacity:0.6; }
  .status-live{ display:inline-flex; align-items:center; gap:7px; }
  .status-dot{ width:7px; height:7px; border-radius:50%; background:#22c55e; flex-shrink:0; }

  .project-section{ padding-top:48px; padding-bottom:48px; }
  .project-stage{
    position:relative; width:100%; aspect-ratio:16/9;
    background:#1a1a1a; border-radius:20px; overflow:hidden;
  }

  .kpi-section{ padding-bottom:64px; }
  .kpi-row{
    display:grid; grid-template-columns:1fr 1fr 1fr;
    border-top:1px solid var(--line);
    border-bottom:1px solid var(--line);
    padding:32px 0;
  }
  .kpi{ display:flex; flex-direction:column; gap:6px; padding:0 40px; }
  .kpi:first-child{ padding-left:0; }
  .kpi:last-child{ padding-right:0; }
  .kpi + .kpi{ border-left:1px solid var(--line); }
  .kpi-num{
    font-size:clamp(28px,3.5vw,48px); font-weight:500;
    letter-spacing:-0.05em; line-height:1;
  }
  .kpi-label{ font-size:13px; color:var(--muted); }

  @media(max-width:880px){
    .hero-name{ font-size:clamp(24px,7vw,48px); }
    .kpi-row{ padding:24px 0; }
    .kpi{ padding:0 20px; }
  }
</style>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
(function(){
  var stage=document.getElementById('stage');
  var tc=document.createElement('canvas');
  var ctx=tc.getContext('2d');

  var renderer=new THREE.WebGLRenderer({antialias:true,alpha:false});
  renderer.setClearColor(0xffffff);
  var gl=renderer.domElement;
  gl.style.cssText='position:absolute;inset:0;width:100%;height:100%;z-index:0;';
  stage.prepend(gl);

  var scene=new THREE.Scene();
  var cam=new THREE.OrthographicCamera(-1,1,1,-1,0,1);
  var tex=new THREE.CanvasTexture(tc);
  tex.minFilter=tex.magFilter=THREE.LinearFilter;

  var mat=new THREE.ShaderMaterial({
    uniforms:{uTex:{value:tex}},
    vertexShader:'varying vec2 vUv;void main(){vUv=uv;gl_Position=vec4(position.xy,0.,1.);}',
    fragmentShader:[
      'precision mediump float;',
      'uniform sampler2D uTex;',
      'varying vec2 vUv;',
      'const vec2 LC=vec2(.300,.500),RC=vec2(.700,.500),LR=vec2(.162,.216);',
      'const float RS=.58;',
      'vec4 glass(vec2 u,vec2 c){',
      '  vec2 d=(u-c)/LR;float t=dot(d,d);',
      '  if(t>=1.)return texture2D(uTex,u);',
      // pow(1-t, 1.5): more mid-range distortion than (1-t)^2
      '  float f=pow(max(0.,1.-t),1.5)*RS;',
      '  vec2 off=(u-c)*f;',
      // dispersion ramps 4% → 15% toward edge — visible RGB fringing
      '  float disp=.040+t*.110;',
      '  float r=texture2D(uTex,u-off*(1.+disp)).r;',
      '  float g=texture2D(uTex,u-off).g;',
      '  float b=texture2D(uTex,u-off*(1.-disp)).b;',
      // ghost: dim secondary image opposite direction (thick-glass internal reflection)
      '  vec2 goff=off*.20;',
      '  r=r*.92+texture2D(uTex,u+goff*(1.+disp)).r*.08;',
      '  g=g*.92+texture2D(uTex,u+goff).g*.08;',
      '  b=b*.92+texture2D(uTex,u+goff*(1.-disp)).b*.08;',
      '  return vec4(clamp(vec3(r,g,b),0.,1.),1.);',
      '}',
      'void main(){',
      '  vec2 dL=(vUv-LC)/LR,dR=(vUv-RC)/LR;',
      '  if(dot(dL,dL)<1.)gl_FragColor=glass(vUv,LC);',
      '  else if(dot(dR,dR)<1.)gl_FragColor=glass(vUv,RC);',
      '  else gl_FragColor=texture2D(uTex,vUv);',
      '}'
    ].join('\n')
  });
  scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2),mat));

  var W=1,H=1;
  function resize(){
    var r=stage.getBoundingClientRect(),dpr=window.devicePixelRatio||1;
    W=Math.round(r.width*dpr);H=Math.round(r.height*dpr);
    tc.width=W;tc.height=H;
    renderer.setSize(r.width,r.height);
    renderer.setPixelRatio(dpr);
  }
  new ResizeObserver(resize).observe(stage);
  resize();

  var CHARS='Radio'.split('');
  function frame(t){
    ctx.fillStyle='#ffffff';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#0a0a0a';
    var fs=H*.56,ls=-0.05*fs;
    var chars=CHARS.map(function(ch,i){
      var wt=Math.round(100+800*(Math.sin(t*0.8+i*1.0)*0.5+0.5));
      ctx.font=wt+' '+fs+'px Inter,sans-serif';
      return{ch:ch,wt:wt,w:ctx.measureText(ch).width};
    });
    var tw=chars.reduce(function(s,c,i){return s+c.w+(i<chars.length-1?ls:0);},0);
    var x=(W-tw)/2,y=H*.5+fs*.35;
    chars.forEach(function(c,i){
      ctx.font=c.wt+' '+fs+'px Inter,sans-serif';
      ctx.fillText(c.ch,x,y);
      x+=c.w+(i<chars.length-1?ls:0);
    });
    tex.needsUpdate=true;
    renderer.render(scene,cam);
  }

  var t0=null;
  function loop(ts){
    if(!t0)t0=ts;
    frame((ts-t0)/1e3);
    requestAnimationFrame(loop);
  }
  document.fonts.ready.then(function(){ requestAnimationFrame(loop); });
})();
</script>
